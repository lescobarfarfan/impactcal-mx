# Parameters over hard-coding (CAL-GEN-06). Spanish identifiers verbatim (CAL-GEN-08).
# Every run resolves this config into its manifest (CAL-GEN-05).

proyecto:
  nombre: impactcal-mx
  # data_root: /Volumes/DISCO_EXTERNO/impactcal_data   # descomentar si los datos viven fuera del repo

periodo:
  anio_inicial: 2000        # CAL-TARGET-02: acotado por CENAPRED
  anio_final: null          # null = último año completo disponible

hazard:
  timestep_horas: 0.5       # CAL-WIND-02 (superseded 2026-07-12): congelado por test de convergencia
  cuencas: [EP, NA]
  ibtracs_provider: usa
  dem_path: dem/SRTM15+V2_Mexico.tif   # relativo a data root; congelado con procedencia (OQ-CAL-05)
  riverflood:
    depth_nc: null          # sin insumo histórico: los .nc en mano son ISIMIP2b RCP 2006-2100 (OQ-CAL-06)
    fraction_nc: null

impacto:
  v_thresh: 25.7            # m/s, FIJO — CAL-IMPF-01 [Emanuel2011][Eberenz2021]
  scale: 1.0                # FIJO — CAL-IMPF-01
  malla_v_half: {inicio: 30.0, fin: 120.0, paso: 2.0}     # superficie precomputada (CAL-BAYES-02)
  malla_kappa: {inicio: 0.1, fin: 3.0, paso: 0.1}
  curva_jrc: {region: NorthAmerica, sector: residential}  # CAL-IMPF-02 [Huizinga2017]

deflactor:
  indice: INPC              # CAL-TARGET-03, fuente INEGI
  anio_base: null           # fijar al cerrar el panel

fuentes_externas:
  # Rutas máquina-local a insumos producidos en el repo climateCCR. La ingesta los congela en
  # data/<fuente>/ con procedencia (CAL-GEN-02); la calibración solo lee las copias congeladas
  # (CAL-GEN-12). Cobertura CENAPRED machine-readable hoy: 2000-2015 (capturas 2016+ pendientes).
  cenapred_consolidados: /Users/lescobarfarfan/Documents/projects/Thesis_MScQF/climateCCR/data/hazard_mx/datos_CENAPRED/consolidados
  ibtracs_crudos: /Users/lescobarfarfan/Documents/projects/Thesis_MScQF/climateCCR/data/hazard_mx/datos_IBTrACS/crudos
  ibtracs_nc: ~/climada/data/IBTrACS.ALL.v04r01.nc   # caché CLIMADA, congelado tal cual (date_created interno 2025-08-22)
  dem_mexico: /Users/lescobarfarfan/Library/Mobile Documents/com~apple~CloudDocs/Data_Backup/climada_accute_risks/Raster_Topografia/SRTM15+V2_Mexico.tif
  dem_global: /Users/lescobarfarfan/Library/Mobile Documents/com~apple~CloudDocs/Data_Backup/climada_accute_risks/auxiliares/SRTM15+V2.tiff   # 3.4 GB: solo su sha256 en la procedencia del recorte, no se copia
  isimip_dir: /Users/lescobarfarfan/Library/Mobile Documents/com~apple~CloudDocs/Data_Backup/climada_accute_risks/auxiliares   # .nc ISIMIP2b RCP: pin en sitio, no se copian a data/

timestep_test:              # OQ-CAL-01 / CAL-WIND-02; protocolo master doc §3.4
  eventos:                  # SIDs resueltos del índice IBTrACS congelado
    - {nombre: Wilma, sid: "2005289N18282"}
    - {nombre: Odile, sid: "2014253N13260"}
    - {nombre: Patricia, sid: "2015293N13266"}
    - {nombre: Willa, sid: "2018292N14261"}
  timesteps_horas: [0.25, 0.5, 1.0, 3.0]    # el más fino = referencia de convergencia
  resoluciones_arcsec: [150, 300]           # interacción timestep × resolución (§3.4.4)
  exposicion: litpop        # litpop (hazard sobre centroides de exposición) | uniforme (malla regular)
  bbox: {lat_min: 14.0, lat_max: 33.0, lon_min: -118.0, lon_max: -86.0}   # malla si exposicion=uniforme
  ref_v_half: 74.7          # referencia FIJA (default Emanuel-USA de CLIMADA); solo convergencia,
                            # nunca magnitud — la función calibrada llega después (CAL-IMPF-01)

crosswalk:                  # DC-XWALK-1; reglas CAL-XWALK-01/02 — v0 lado-pérdidas (OQ-CAL-02)
  version: v0.1-nombres-fechas
  subtipos_ciclonicos: [CT, MT, MF]   # ciclón tropical, marea de tormenta, mar de fondo
  subtipos_fluviales: [LLUV, INUND]   # daños por lluvia, inundación
  buffer_dias: 3                      # ventana evento↔tormenta para el empate por fechas
  bbox_mexico: {lat_min: 12.0, lat_max: 35.0, lon_min: -120.0, lon_max: -84.0}

semilla_base: 20260708
